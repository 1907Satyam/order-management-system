<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDS | Caffe-30 Sijhora</title>
    <style>
        :root {
            --primary: #c98a4b;
            --primary-dark: #8c5521;
            --bg-color: #fdf8f4;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(139, 90, 43, 0.2);
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            background-image: linear-gradient(rgba(253, 248, 244, 0.92), rgba(253, 248, 244, 0.95)), url('https://images.unsplash.com/photo-1447933601403-0c6688de566e?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-attachment: fixed;
            background-size: cover;
            color: #2b1b12;
        }

        header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(43, 27, 18, 0.1);
        }

        header h1 {
            margin: 0;
            color: var(--primary-dark);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .order-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .order-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(43, 27, 18, 0.15);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed var(--glass-border);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .order-header h2 {
            margin: 0;
            font-size: 1.8rem;
            color: var(--primary-dark);
        }

        .table-badge {
            background: var(--primary-dark);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .order-items {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
            flex: 1;
        }

        .order-items li {
            font-size: 1.2rem;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .special-instructions {
            background: rgba(255, 77, 77, 0.1);
            color: #d32f2f;
            padding: 10px;
            border-radius: 10px;
            font-size: 1rem;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 77, 77, 0.3);
        }

        .done-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }

        .done-btn:hover {
            background: #2ecc71;
        }

        .empty-state {
            text-align: center;
            grid-column: 1 / -1;
            font-size: 1.5rem;
            color: var(--primary-dark);
            padding: 50px;
            background: var(--glass-bg);
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Kitchen Display System (KDS)</h1>
        <p>Active Orders Live Feed</p>
    </header>

    <div id="orders-grid">
        <!-- Orders will be injected here via JavaScript -->
    </div>

    <script>
        const ordersGrid = document.getElementById('orders-grid');

        // Function to fetch active orders from the database
        async function fetchOrders() {
            try {
                const response = await fetch('/api/orders/active');
                const data = await response.json();
                renderOrders(data.active_orders);
            } catch (error) {
                console.error("Error fetching orders:", error);
            }
        }

        // Function to build the HTML for the order cards
        // Replace ONLY the renderOrders function inside your admin.html script
        function renderOrders(orders) {
            ordersGrid.innerHTML = ''; 

            if (orders.length === 0) {
                ordersGrid.innerHTML = `<div class="empty-state">No active orders. The kitchen is clear! 🎉</div>`;
                return;
            }

            orders.forEach(order => {
                let itemsHTML = '';
                order.items.forEach(item => {
                    // 🌟 Now shows quantity! (e.g., 2x Thick Cold Coffee)
                    itemsHTML += `<li><span><strong>${item.quantity}x</strong> ${item.name}</span></li>`;
                });

                let notesHTML = '';
                if (order.special_instructions && order.special_instructions.trim() !== '') {
                    notesHTML = `<div class="special-instructions"><strong>Note:</strong> ${order.special_instructions}</div>`;
                }

                const card = document.createElement('div');
                card.className = 'order-card';
                card.innerHTML = `
                    <div>
                        <div class="order-header">
                            <!-- 🌟 Now shows Customer Name instead of Order #1, #2 -->
                            <h2>${order.customer_name}</h2>
                            <span class="table-badge">Table ${order.table_number}</span>
                        </div>
                        <p style="margin-top:0; color:#8c5521;">📞 ${order.customer_phone}</p>
                        <ul class="order-items">
                            ${itemsHTML}
                        </ul>
                        ${notesHTML}
                    </div>
                    <button class="done-btn" onclick="markAsDone(${order.id})">Mark as Done ✓</button>
                `;
                ordersGrid.appendChild(card);
            });
        }

        // Function to update the database when an order is finished
        async function markAsDone(orderId) {
            try {
                const response = await fetch(`/api/order/${orderId}/complete`, {
                    method: 'PUT'
                });
                
                if (response.ok) {
                    fetchOrders(); // Refresh the grid immediately
                }
            } catch (error) {
                console.error("Error completing order:", error);
            }
        }

        // Fetch orders immediately on load
        fetchOrders();

        // Auto-refresh the kitchen display every 5 seconds
        setInterval(fetchOrders, 5000);
    </script>
</body>
</html>
